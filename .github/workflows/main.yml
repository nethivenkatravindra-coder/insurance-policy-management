name: Insurance CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t insurance-app .

      - name: Test Docker Container
        run: |
          docker run -d --name insurance-container -p 8080:80 insurance-app
          sleep 10
          docker ps